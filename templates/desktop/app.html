<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Desktop App</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font: 15px/1.6 -apple-system, "Segoe UI", system-ui, sans-serif;
    background: #1c1c1c; color: #ececec; height: 100vh; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  h1 { font-size: 28px; }
  p { color: #9aa0a6; }
  .row { display: flex; gap: 10px; }
  input { padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #262626; color: #ececec; font: inherit; }
  button { padding: 10px 16px; border-radius: 8px; border: 0; background: #3fb950; color: #06210f; font: inherit; font-weight: 600; cursor: pointer; }
  ul { list-style: none; padding: 0; width: 320px; }
  li { background: #262626; border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>My Desktop App</h1>
  <p>A native window with no dependencies. Edit app.html to build your app.</p>
  <div class="row">
    <input id="task" placeholder="Add a task…">
    <button id="add">Add</button>
  </div>
  <ul id="list"></ul>
<script>
  const list = document.getElementById("list");
  const input = document.getElementById("task");
  function add() {
    const v = input.value.trim(); if (!v) return;
    const li = document.createElement("li"); li.textContent = v;
    list.appendChild(li); input.value = ""; input.focus();
  }
  document.getElementById("add").onclick = add;
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
</script>
</body>
</html>
