<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <rect width="980" height="430" fill="#ffffff"/>

  <style>
    .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 600; fill: #171717; }
    .note { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; fill: #6b6b6b; }
    .card { fill: #fff; stroke: #e8e8e4; stroke-width: 1.5; }
    .green { fill: #22c55e; }
    .ink { fill: #101914; }
    .soft { fill: #f6f6f3; }
  </style>

  <g transform="translate(70 46)">
    <rect class="card" x="0" y="0" width="390" height="320" rx="28"/>
    <text class="label" x="195" y="355" text-anchor="middle">Boolean switch</text>

    <g transform="translate(95 78)">
      <rect x="0" y="0" width="200" height="118" rx="59" class="ink"/>
      <circle cx="143" cy="59" r="43" fill="#ffffff"/>
      <text x="54" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="45" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
      <text x="143" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="49" font-weight="700" fill="#101914" text-anchor="middle">0</text>
      <rect x="72" y="143" width="58" height="7" rx="3.5" class="green"/>
    </g>

    <text class="note" x="195" y="246" text-anchor="middle">Best for the Boolean name</text>
    <text class="note" x="195" y="268" text-anchor="middle">simple, but more product-like</text>
  </g>

  <g transform="translate(520 46)">
    <rect class="card" x="0" y="0" width="390" height="320" rx="28"/>
    <text class="label" x="195" y="355" text-anchor="middle">Terminal mark</text>

    <g transform="translate(116 58)">
      <rect x="0" y="0" width="158" height="158" rx="36" class="ink"/>
      <path d="M48 52 L83 79 L48 106" fill="none" stroke="#22c55e" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="91" y="101" width="38" height="10" rx="5" class="green"/>
    </g>

    <text class="note" x="195" y="246" text-anchor="middle">Best for chat, code, and commands</text>
    <text class="note" x="195" y="268" text-anchor="middle">clearer at small taskbar size</text>
  </g>
</svg>
