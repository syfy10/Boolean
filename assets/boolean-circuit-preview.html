<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Boolean Circuit Icon Preview</title>
<style>
  :root{ color-scheme:light; font-family:Inter,Segoe UI,Arial,sans-serif; }
  body{ margin:0; min-height:100vh; display:grid; place-items:center; background:#f7f8f6; color:#101712; }
  .wrap{ display:flex; gap:42px; align-items:center; padding:42px; }
  .sample{ display:grid; gap:14px; justify-items:center; }
  .tile{ width:180px; height:180px; display:grid; place-items:center; background:#fff; border:1px solid #e4e7e2; border-radius:38px; }
  .mark{ width:148px; height:148px; }
  .small-row{ display:flex; gap:12px; align-items:center; }
  .small{ width:36px; height:36px; }
  .label{ font-size:14px; color:#4f5a52; }
</style>
<body>
  <main class="wrap">
    <section class="sample">
      <div class="tile"><img class="mark" src="boolean-circuit-icon.svg" alt="App tile"></div>
      <div class="small-row"><img class="small" src="boolean-circuit-icon.svg" alt=""><span class="label">App tile</span></div>
    </section>
    <section class="sample">
      <div class="tile"><img class="mark" src="boolean-circuit-mark.svg" alt="Transparent mark"></div>
      <div class="small-row"><img class="small" src="boolean-circuit-mark.svg" alt=""><span class="label">Transparent mark</span></div>
    </section>
  </main>
</body>
</html>
